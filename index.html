            </div>
                <div class="flex gap-3 cursor-pointer">

                </div>
        </nav>
        <!-- Mobile Screen -->

        <!-- Desktop Screen -->
        <nav class="hidden md:flex lg:flex xl:flex items-center justify-between pt-2 px-6 xl:px-16 fixed top-0 left-0 w-full bg-white">

                    <img class="w-5" src="./src/assets/icons/user.png" alt="User">
                </div>
            </div>
        </nav>
        <!-- Desktop Screen -->

    </header>

                    <p class="text-4xl text-gray-200">|</p>

                        <div class="flex gap-6">
                            <div class="flex cursor-pointer">

                                <img class="w-5 cursor-pointer hover:outline-none" src="./src/assets/icons/down.png" alt="down">
                            </div>
                            <div class="flex pr-2 cursor-pointer hover:outline-none">

                                <img class="w-5" src="./src/assets/icons/down.png" alt="down">

                            <div class="flex pr-3 cursor-pointer hover:outline-none">

                            </div>
                        </div>
                    </div>
                    <div>
                        <img class="bg-[#593cfb] rounded-[10px] h-10 py-2 px-2 cursor-pointer" src="./src/assets/icons/search.png" alt="Search">

                </div>

                        <img class="w-3 h-3" src="./src/assets/icons/right-arrow.png" alt="right-arrow">
                    </button>
                </div>
            </div>
        </div>
